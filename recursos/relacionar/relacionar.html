<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relacionar columnas</title>

   <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,500,700&display=swap" rel="stylesheet" />
    <!-- MDB -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.1.0/mdb.min.css" rel="stylesheet" />


    <!-- Estilos propios -->
    <link rel="stylesheet" href="../styles/css/index.css">
    <link rel="stylesheet" href="./seleccion.css">

</head>
<body>

    <main>

        <section>
            <div class="container py-4 mt-5 mb-5">
                <h1 class="parrafo titulo-azul">Relacionar columnas</h1>            
                <p class="parrafo instrucciones color--verde"><b>Instrucción:</b> Relaciona correctamente las columnas.</p>


                <div class="selescts escribir-12-2">
                    <div class="grid-columnas2 escritorio">
                        
                        <div class="bg-grey-columna colu1">
                            <p><strong>Columna A</strong></p>
                        </div>                        
                        <div class="bg-grey-columna colu2">
                            <p><strong>Columna B</strong></p>
                        </div>
                    </div>

                    <div class="grid-columnas2 cuadroazul movil">
                        <div>
                            a) <i lang="en">Phone</i><br aria-hidden="true">
                            b) <i lang="en">Day</i><br aria-hidden="true">
                            c) <i lang="en">Ice cream</i><br aria-hidden="true">
                        </div>
                        <div>
                            d) <i lang="en">Name</i><br aria-hidden="true">
                            e) <i lang="en">Ice</i><br aria-hidden="true">
                        </div>
                        
                        
                    </div>

                        
                    <div class="grid-columnas3">
                        <div class="cont-grid-columnas4 sbdm azulfondo">
                            <!--<p>I scream</p>-->
                            <label for="act-esc-12-2-1" class="mb-0">Helado</label>
                        </div>
                        <div class="cont-grid-columnas4" id="opesc21">
                            <input id="act-esc-12-2-1" type="text" placeholder="" name="escribir-12-2" class="pla1 escribir" lang="en">
                            <div class="contselopce invisible">
                                <div class="TexEsc TextEsc21-2-1"></div>
                                <i class="result fa-solid result-1" aria-hidden="true"></i>
                            </div>
                            <div class="respmens sr-only respmense-1"></div>
                        </div>
                        
                        <div class="cont-grid-columnas4 vacia azulfondo">
                            <p>a) <i lang="en">Phone</i></p>
                        </div>
                    </div>

                    <div class="grid-columnas3">
                        <div class="cont-grid-columnas4 sbdm rosafondo">
                            <!--<p>An aim</p>-->
                            <label for="act-esc-12-2-2" class="mb-0">Nombre</label>
                        </div>
                        <div class="cont-grid-columnas4" id="opesc22">
                            <input id="act-esc-12-2-2" type="text" placeholder="" name="escribir-12-2" class="pla1 escribir" lang="en">
                            <div class="contselopce invisible">
                                <div class="TexEsc TextEsc21-2-2"></div>
                                <i class="result fa-solid result-2" aria-hidden="true"></i>
                            </div>
                            <div class="respmens sr-only respmense-2"></div>
                        </div>                        
                        <div class="cont-grid-columnas4 vacia rosafondo">
                            <p>b) <i lang="en">Day</i></p>
                        </div>
                    </div>

                    <div class="grid-columnas3">
                        <div class="cont-grid-columnas4 sbdm azulfondo">
                            <!--<p>New display</p>-->
                            <label for="act-esc-12-2-3" class="mb-0">Teléfono</label>
                        </div>
                        <div class="cont-grid-columnas4" id="opesc23">
                            <input id="act-esc-12-2-3" type="text" placeholder="" name="escribir-12-2" class="pla1 escribir" lang="en">
                            <div class="contselopce invisible">
                                <div class="TexEsc TextEsc21-2-3"></div>
                                <i class="result fa-solid result-3" aria-hidden="true"></i>
                            </div>
                            <div class="respmens sr-only respmense-3"></div>
                        </div>                        
                        <div class="cont-grid-columnas4 vacia azulfondo">
                            <p>c) <i lang="en">Ice cream</i></p>
                        </div>
                    </div>

                    <div class="grid-columnas3">
                        <div class="cont-grid-columnas4 sbdm rosafondo">
                            <!--<p>Grade A</p>-->
                            <label for="act-esc-12-2-4" class="mb-0">Día</label>
                            <div class="respmens sr-only"></div>
                        </div>
                        <div class="cont-grid-columnas4" id="opesc24">
                            <input id="act-esc-12-2-4" type="text" placeholder="" name="escribir-12-2" class="pla1 escribir" lang="en">
                            <div class="contselopce invisible">
                                <div class="TexEsc TextEsc21-2-4"></div>
                                <i class="result fa-solid result-4" aria-hidden="true"></i>
                            </div>
                            <div class="respmens sr-only respmense-4"></div>
                        </div>                        
                        <div class="cont-grid-columnas4 vacia rosafondo">
                            <p>d) <i lang="en">Name</i> </p>
                        </div>
                    </div>

                    <div class="grid-columnas3">
                        <div class="cont-grid-columnas4 sbdm azulfondo">
                            <!--<p>An iceman</p>-->
                            <label for="act-esc-12-2-5" class="mb-0">Hielo</label>
                        </div>
                        <div class="cont-grid-columnas4" id="opesc25">
                            <input id="act-esc-12-2-5" type="text" placeholder="" name="escribir-12-2" class="pla1 escribir" lang="en">
                            <div class="contselopce invisible">
                                <div class="TexEsc TextEsc21-2-5"></div>
                                <i class="result fa-solid result-5" aria-hidden="true"></i>
                            </div>
                            <div class="respmens sr-only respmense-5"></div>
                        </div>                        
                        <div class="cont-grid-columnas4 vacia azulfondo">
                            <p>e) <i lang="en">Ice</i> </p>
                        </div>
                    </div>

            

                    <div class="retroalimentacion1 rojoretro"></div>

                    <div class="contenedor-botones4">
                        <div class="text-right evaluacion">
                            <button id="check-e-12-2" role="button" class="btn boton-check btn-reintentar no-imp btn-descarga waves-effect waves-light escribir" disabled="" data-toggle="modal" data-target="#mision" name="escribir-12-2">
                                Revisar
                            </button>
                            <button id="try-e-12-2" role="button" class="btn btn-reintentar no-imp btn-descarga waves-effect waves-light" disabled="" data-toggle="modal" data-target="#mision" name="try-s-12-2">Intentar de nuevo</button>
                        </div>
                        
                    </div>

            </div>
                
            </div>
        </section>

    </main>

    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.4/umd/popper.min.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mdbootstrap/4.10.1/js/mdb.min.js"></script>

    <script src="./PDF-Imp.js"></script>
