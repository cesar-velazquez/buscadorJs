<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Inicio Sesión</title>
</head>

<body class="max-w-[1116px] m-auto">

    <header class="border-2 border-gray-500/30 py-4 px-8 fixed right-0 left-0 z-10 bg-sky-800
flex justify-between items-center">
        <div class="logo">
            <a class="font-bold" href="#">Mi Sitio Web</a>
        </div>

        <nav class="">
            <ul class="flex gap-4 justify-center items-center">
                <li><a class="font-bold" href="#">Inicio</a></li>
                <li><a class="font-bold" href="#">Servicios</a></li>
                <li><a class="font-bold" href="#">Contacto</a></li>
                <li id="cart"><i class='text-xl bx bxs-cart cursor-pointer hover:text-red-400 relative '>
                        <span id="numItem" class="absolute z-10 text-xl"></span>
                    </i></li>
            </ul>
        </nav>
    </header>

    <!-- <h1 class="font-bold text-4xl text-center ">Login</h1> -->
    <main class="flex margin-auto justify-center items-center min-h-screen ">

        <form action="" class="darkForm mb-10 px-4 py-8 bg-white rounded-2xl flex flex-col gap-4 justify-center items-end relative border-4 border-red-600 ">
            <h1 class="text-center font-bold m-auto  ">Iniciar sesión</h1>
            <div class="flex justify-center items-center gap-4">
                <label class="darkLabel font-bold text-black " for="">Usuario</label>
                <input class="rounded-lg p-2 border-2 border-red-600 " type="text" name="user" id="user"
                    placeholder="Escribe tu correo...">
            </div>
            <div class="flex justify-center items-center gap-4">
                <label class="darkLabel font-bold text-black  " for="">Contraseña</label>
                <input id="password" class="rounded-lg p-2 border-2 border-red-600" type="password"
                    placeholder="Escribe tu contraseña...">
            </div>            

            <input id="signIn"
                class=" border-2 border-red-600 font-bold text-black m-auto border-2 py-2 px-4 rounded-xl hover:bg-white hover:text-black cursor-pointer hover:border-2 "
                type="submit" value="Sign In">

            <div id="errorLogin" class="absolute bg-black/50 p-4 top-0 left-0 right-0 bottom-0 rounded-xl hidden
            flex justify-center items-center flex-col gap-6">
                <p class="text-center font-bold text-white  ">Stop 🤯!</p>
                <button id="removeLogin"
                    class="bg-red-800 text-white font-bold px-5 py-2 rounded-lg hover:bg-white hover:text-red-700">Incorrect
                    Credentials</button>
            </div>
        </form>
    </main>

    <!-- </main> -->

</body>

<script src="./js/main.js"></script>

</html>
